// ── Simple SVG Bar Chart ───────────────────────────────────────────────────
function BarChart({data}){
  if(!data||data.length===0)return <div style={{color:"#aaa",fontSize:"0.82rem",textAlign:"center",padding:"40px 0"}}>No data yet</div>;
  const max=Math.max(...data.map(d=>d.views),1);
  const h=160,pad=8,bw=Math.max(20,Math.floor((280-pad*2)/data.length)-6);
  return(
    <svg width="100%" viewBox={`0 0 280 ${h+30}`} style={{overflow:"visible"}}>
      {data.map((d,i)=>{
        const bh=Math.max((d.views/max)*(h-10),d.views>0?4:0);
        const x=pad+i*((280-pad*2)/data.length)+((280-pad*2)/data.length-bw)/2;
        const y=h-bh;
        return(
          <g key={d.name}>
            <rect x={x} y={y} width={bw} height={bh} fill={PLAT_C[d.name]||"#7a9e7e"} rx="4" opacity="0.9"/>
            <text x={x+bw/2} y={h+14} textAnchor="middle" fontSize="9" fill="#9e9e9e" fontFamily="Lato,sans-serif">{d.name.slice(0,2)}</text>
            {d.views>0&&<text x={x+bw/2} y={y-3} textAnchor="middle" fontSize="8" fill="#7a7a7a" fontFamily="Lato,sans-serif">{d.views>=1000?(d.views/1000).toFixed(1)+"k":d.views}</text>}
          </g>
        );
      })}
    </svg>
  );
}

      <div style={{fontFamily:"'Playfair Display',serif",fontWeight:"600",fontSize:"0.9rem",color:"#2d2d2d",marginBottom:"7px",lineHeight:"1.35",paddingRight:showSeq&&item.seqNum?"28px":"0"}}>{item.title||"Untitled"}</div>
      <div style={{fontSize:"0.77rem",color:"#6e6e6e",lineHeight:"1.55",marginBottom:"10px"}}>{trunc(item.body||"",100)}</div>
      <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
        {(item.platforms||[]).map(p=><span key={p} style={{...bdg(PLAT_C[p]||"#9e9e9e"),fontSize:"0.61rem"}}>{p}</span>)}
        {item.format&&<span style={{...bdg("#9e9e9e"),fontSize:"0.61rem"}}>{item.format}</span>}
      </div>
      {item.datePublished&&<div style={{fontSize:"0.68rem",color:"#b8b8b0",marginTop:"8px"}}>{fmtDate(item.datePublished)}</div>}
    </div>
  );
}

// ── Library Tab ────────────────────────────────────────────────────────────
function LibraryTab({library,filtered,search,setSearch,fPillar,setFPillar,fStatus,setFStatus,fPlatform,setFPlatform,fCluster,setFCluster,grouped,setGrouped,onAdd,onImport,onView,getCC}){
  const clusters=[...new Set(library.map(i=>i.cluster).filter(Boolean))];
  const sel={...inp,maxWidth:"148px",cursor:"pointer"};
  const sorted=grouped?[...filtered].sort((a,b)=>{const ci=clusters.indexOf(a.cluster)-clusters.indexOf(b.cluster);return ci!==0?ci:(a.seqNum||99)-(b.seqNum||99);}):filtered;
  const gmap={};
  if(grouped)sorted.forEach(i=>{const k=i.cluster||"Uncategorised";if(!gmap[k])gmap[k]=[];gmap[k].push(i);});

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px",marginBottom:"18px"}}>
        {[{l:"TOTAL",v:library.length,c:"#7a9e7e"},{l:"PUBLISHED",v:library.filter(i=>i.status==="Published").length,c:"#5a8f5a"},{l:"REPURPOSED",v:library.filter(i=>i.status==="Repurposed").length,c:"#b07040"},{l:"DRAFTED",v:library.filter(i=>i.status==="Drafted").length,c:"#4a8fa0"},{l:"IDEAS",v:library.filter(i=>i.status==="Idea").length,c:"#c49a3c"}].map(s=><StatBox key={s.l} value={s.v} label={s.l} color={s.c}/>)}
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
        <input style={{...inp,maxWidth:"200px"}} placeholder="🔍  Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select style={sel} value={fCluster} onChange={e=>setFCluster(e.target.value)}><option value="All">All Series</option>{clusters.map(c=><option key={c}>{c}</option>)}</select>
        <select style={sel} value={fPillar} onChange={e=>setFPillar(e.target.value)}><option value="All">All Pillars</option>{PILLARS.map(p=><option key={p}>{p}</option>)}</select>
        <select style={sel} value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="All">All Status</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
        <select style={sel} value={fPlatform} onChange={e=>setFPlatform(e.target.value)}><option value="All">All Platforms</option>{PLATFORMS.map(p=><option key={p}>{p}</option>)}</select>
        <button onClick={()=>setGrouped(!grouped)} style={{...sBtn(),background:grouped?"#f0f7f0":"white",color:grouped?"#5a8f5a":"#4a4a4a",borderColor:grouped?"#7a9e7e":"#e4e0d8",fontSize:"0.78rem"}}>
          {grouped?"✦ Series On":"◻ Series Off"}
        </button>
        <div style={{marginLeft:"auto",display:"flex",gap:"8px"}}>
          <button style={sBtn()} onClick={onImport}>⬆ Import CSV</button>
          <button style={pBtn()} onClick={onAdd}>+ Add Content</button>
        </div>
      </div>
      <div style={{color:"#aaa",fontSize:"0.76rem",marginBottom:"14px"}}>{filtered.length} item{filtered.length!==1?"s":""}{(search||fCluster!=="All"||fPillar!=="All"||fStatus!=="All"||fPlatform!=="All")?" matching filters":" in library"}{grouped?" · grouped by series":""}</div>

      {filtered.length===0?(
        <div style={{...card,textAlign:"center",padding:"60px 40px"}}>
          {library.length===0?(<><div style={{fontSize:"3rem",marginBottom:"14px"}}>📝</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.15rem",color:"#2d2d2d",marginBottom:"8px"}}>Your library is empty</div><div style={{color:"#9e9e9e",fontSize:"0.85rem",marginBottom:"20px"}}>Add content manually or import your Metricool CSV</div><div style={{display:"flex",gap:"10px",justifyContent:"center"}}><button style={sBtn()} onClick={onImport}>⬆ Import CSV</button><button style={pBtn()} onClick={onAdd}>+ Add First Item</button></div></>)
          :<div style={{color:"#9e9e9e",fontSize:"0.88rem"}}>No items match your filters</div>}
        </div>
      ):grouped?(
        <div style={{display:"flex",flexDirection:"column",gap:"24px"}}>
          {Object.entries(gmap).map(([name,items])=>{
            const cc=getCC(name);
            const pub=items.filter(i=>i.status==="Published").length;
            const rep=items.filter(i=>i.status==="Repurposed").length;
            return(
              <div key={name}>
                <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"12px"}}>
                  <div style={{height:"2px",flex:"0 0 20px",background:`${cc}50`,borderRadius:"2px"}}/>
                  <div style={{display:"flex",alignItems:"center",gap:"7px",flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Playfair Display',serif",fontWeight:"700",color:cc,fontSize:"0.95rem"}}>{name}</span>
                    <span style={bdg(cc)}>{items.length} items</span>
                    {pub>0&&<span style={bdg(STATUS_C.Published)}>{pub} published</span>}
                    {rep>0&&<span style={bdg(STATUS_C.Repurposed)}>{rep} repurposed</span>}
                  </div>
                  <div style={{height:"2px",flex:1,background:`${cc}30`,borderRadius:"2px"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:"12px"}}>
                  {items.map(item=><ContentCard key={item.id} item={item} onClick={()=>onView(item)} cc={cc} showSeq/>)}
                </div>
              </div>
            );
          })}
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:"13px"}}>
          {sorted.map(item=><ContentCard key={item.id} item={item} onClick={()=>onView(item)} cc={getCC(item.cluster)}/>)}
        </div>
      )}
    </div>
  );
}

// ── Performance Tab ────────────────────────────────────────────────────────

              <BarChart data={pd}/>

            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:"600",fontSize:"0.95rem"}}>Top Performers</div>
                <div style={{display:"flex",gap:"6px"}}>
                  <select style={sel} value={fp} onChange={e=>setFp(e.target.value)}><option value="All">All Platforms</option>{PLATFORMS.map(p=><option key={p}>{p}</option>)}</select>
                  <select style={sel} value={sortBy} onChange={e=>setSortBy(e.target.value)}><option value="views">By Views</option><option value="likes">By Likes</option><option value="engagement">By Engagement</option><option value="avgWatch">By Watch Time</option></select>
                </div>

              <div style={{display:"flex",flexDirection:"column",gap:"5px",maxHeight:"260px",overflowY:"auto"}}>
                {top.map((p,i)=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 10px",borderRadius:"8px",background:i===0?"#f4f9f4":i<3?"#fafaf8":"transparent"}}>
                    <div style={{width:"22px",height:"22px",borderRadius:"50%",background:i<3?"#7a9e7e":"#e8e4dc",color:i<3?"white":"#9e9e9e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.68rem",fontWeight:"800",flexShrink:0}}>{i+1}</div>

// ── Planner Tab ────────────────────────────────────────────────────────────
function PlannerTab({library,performance,getCC}){
  const clusters=[...new Set(library.map(i=>i.cluster).filter(Boolean))];
  const toRepurpose=library.filter(i=>i.status==="Published");
  const drafts=library.filter(i=>i.status==="Drafted");
  const topPerf=[...performance].sort((a,b)=>(+b.views||0)-(+a.views||0)).slice(0,5);
  const pillarGaps=PILLARS.map((p,idx)=>({name:p,count:library.filter(i=>i.pillar===p).length,fill:PILLAR_C[idx]}));
  const seriesData=clusters.map(c=>{
    const items=library.filter(i=>i.cluster===c);
    const pub=items.filter(i=>i.status==="Published").length;
    const rep=items.filter(i=>i.status==="Repurposed").length;
    const idea=items.filter(i=>i.status==="Idea").length;
    const next=items.filter(i=>i.status==="Idea"||i.status==="Drafted").sort((a,b)=>(a.seqNum||99)-(b.seqNum||99))[0];
    const pct=items.length>0?Math.round((pub+rep)/items.length*100):0;
    return{name:c,total:items.length,pub,rep,idea,next,pct,color:getCC(c)};
  });

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"8px",background:"#f0f7f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>📂</div>
          <div><div style={{fontFamily:"'Playfair Display',serif",fontWeight:"600",fontSize:"0.95rem"}}>Content Series Progress</div><div style={{fontSize:"0.73rem",color:"#a0a098"}}>What's done, what's next — across every series</div></div>
        </div>
        {clusters.length===0?<div style={{textAlign:"center",color:"#aaa",padding:"20px",fontSize:"0.83rem"}}>Add content with a Series name to track progress</div>:(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"12px"}}>
            {seriesData.map(s=>(
              <div key={s.name} style={{padding:"14px 16px",borderRadius:"10px",background:"#f8f7f4",borderTop:`3px solid ${s.color}`}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:"600",fontSize:"0.87rem",color:"#2d2d2d",marginBottom:"10px",lineHeight:"1.3"}}>{s.name}</div>
                <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"10px"}}>
                  {s.pub>0&&<span style={bdg(STATUS_C.Published)}>{s.pub} published</span>}
                  {s.rep>0&&<span style={bdg(STATUS_C.Repurposed)}>{s.rep} repurposed</span>}
                  {s.idea>0&&<span style={bdg(STATUS_C.Idea)}>{s.idea} to do</span>}
                </div>
                <div style={{marginBottom:"8px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
                    <span style={{fontSize:"0.71rem",color:"#9e9e9e"}}>Progress</span>
                    <span style={{fontSize:"0.71rem",fontWeight:"700",color:s.color}}>{s.pct}%</span>
                  </div>
                  <div style={{height:"5px",borderRadius:"3px",background:"#e8e4dc",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:"3px",background:s.color,width:`${Math.max(s.pct,s.pct>0?4:0)}%`,transition:"width 0.5s"}}/>
                  </div>
                </div>
                {s.next?<div style={{fontSize:"0.72rem",color:"#7a9e7e"}}>▶ Next: {trunc(s.next.title,36)}</div>:<div style={{fontSize:"0.72rem",color:"#b07040"}}>✓ All items actioned</div>}
              </div>
            ))}
          </div>
        )}
      </div>

            <div><div style={{fontFamily:"'Playfair Display',serif",fontWeight:"600",fontSize:"0.93rem"}}>Repurposing Queue</div><div style={{fontSize:"0.73rem",color:"#a0a098"}}>Published — ready to reuse</div></div>

          </div>

            <div style={{display:"flex",flexDirection:"column",gap:"6px",maxHeight:"220px",overflowY:"auto"}}>
              {toRepurpose.map(item=>(
                <div key={item.id} style={{padding:"9px 11px",borderRadius:"8px",background:"#f8f7f4",borderLeft:`3px solid ${getCC(item.cluster)}`}}>
                  <div style={{fontSize:"0.81rem",fontWeight:"600",marginBottom:"3px"}}>{trunc(item.title||"Untitled",48)}</div>
                  <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                    {item.cluster&&<span style={{fontSize:"0.67rem",color:"#a0a098"}}>{trunc(item.cluster,24)}</span>}

            <div style={{width:"32px",height:"32px",borderRadius:"8px",background:"#f4f0f8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>🏛</div>
            <div><div style={{fontFamily:"'Playfair Display',serif",fontWeight:"600",fontSize:"0.93rem"}}>Pillar Coverage</div><div style={{fontSize:"0.73rem",color:"#a0a098"}}>Where your content lives</div></div>
          </div>

                    <span style={{fontSize:"0.77rem",fontWeight:"700",color:p.fill}}>{p.count}</span>
                  </div>
                  <div style={{height:"5px",borderRadius:"3px",background:"#f0ede8",overflow:"hidden"}}>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"0.79rem",fontWeight:"600",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trunc(p.title||"Untitled",42)}</div>
                    <div style={{fontSize:"0.68rem",color:"#a0a0a0"}}>{p.platform} · {(+p.views||0).toLocaleString()} views</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Add/Edit Modal ─────────────────────────────────────────────────────────
function AddModal({item,onClose,onSave,clusters}){
  const [f,setF]=useState({title:item?.title||"",body:item?.body||"",pillar:item?.pillar||PILLARS[0],format:item?.format||FORMATS[0],platforms:item?.platforms||[],status:item?.status||"Idea",datePublished:item?.datePublished?item.datePublished.slice(0,10):"",tags:item?.tags||"",notes:item?.notes||"",cluster:item?.cluster||"",seqNum:item?.seqNum||"",id:item?.id||null});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const tp=p=>s("platforms",f.platforms.includes(p)?f.platforms.filter(x=>x!==p):[...f.platforms,p]);
  return(
    <Modal title={item?.id?"Edit Content":"Add Content"} onClose={onClose} wide>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"13px"}}>
        <div style={{gridColumn:"1/-1"}}><Lbl>Title</Lbl><input style={inp} value={f.title} onChange={e=>s("title",e.target.value)} placeholder="What is this piece about?"/></div>
        <div style={{gridColumn:"1/-1"}}><Lbl>Body / Script</Lbl><textarea style={{...inp,minHeight:"130px",resize:"vertical"}} value={f.body} onChange={e=>s("body",e.target.value)} placeholder="Paste your script, caption, newsletter, or post here…"/></div>
        <div><Lbl>Content Pillar</Lbl><select style={{...inp,cursor:"pointer"}} value={f.pillar} onChange={e=>s("pillar",e.target.value)}>{PILLARS.map(p=><option key={p}>{p}</option>)}</select></div>
        <div><Lbl>Format</Lbl><select style={{...inp,cursor:"pointer"}} value={f.format} onChange={e=>s("format",e.target.value)}>{FORMATS.map(x=><option key={x}>{x}</option>)}</select></div>
        <div><Lbl>Status</Lbl><select style={{...inp,cursor:"pointer"}} value={f.status} onChange={e=>s("status",e.target.value)}>{STATUSES.map(x=><option key={x}>{x}</option>)}</select></div>
        <div><Lbl>Date Published</Lbl><input type="date" style={inp} value={f.datePublished} onChange={e=>s("datePublished",e.target.value)}/></div>
        <div><Lbl>Content Series</Lbl><input style={inp} value={f.cluster} onChange={e=>s("cluster",e.target.value)} list="clist" placeholder="e.g. Why Your Nervous System Is Loud"/><datalist id="clist">{clusters.map(c=><option key={c} value={c}/>)}</datalist></div>
        <div><Lbl>Order in Series (#)</Lbl><input type="number" style={inp} value={f.seqNum} onChange={e=>s("seqNum",e.target.value)} placeholder="e.g. 3" min="1"/></div>
        <div style={{gridColumn:"1/-1"}}><Lbl>Platforms</Lbl>
          <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
            {PLATFORMS.map(p=><button key={p} type="button" onClick={()=>tp(p)} style={{padding:"6px 13px",borderRadius:"20px",border:`2px solid ${f.platforms.includes(p)?PLAT_C[p]:"#e4e0d8"}`,background:f.platforms.includes(p)?`${PLAT_C[p]}15`:"white",color:f.platforms.includes(p)?PLAT_C[p]:"#9e9e9e",cursor:"pointer",fontSize:"0.79rem",fontWeight:"600"}}>{p}</button>)}
          </div>
        </div>
        <div><Lbl>Tags</Lbl><input style={inp} value={f.tags} onChange={e=>s("tags",e.target.value)} placeholder="breathing, regulation, HSP…"/></div>
        <div><Lbl>Notes to Self</Lbl><input style={inp} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Any notes for future you…"/></div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:"9px",marginTop:"20px"}}>
        <button style={sBtn()} onClick={onClose}>Cancel</button>
        <button style={pBtn()} onClick={()=>{if(!f.title&&!f.body)return alert("Please add a title or body");onSave({...f,datePublished:f.datePublished||null,seqNum:f.seqNum?+f.seqNum:undefined});}}>Save Content</button>
      </div>
    </Modal>
  );
}

// ── Import Library Modal ───────────────────────────────────────────────────
function ImportLibModal({onClose,onImport}){
  const [preview,setPreview]=useState(null);const [mapped,setMapped]=useState([]);const [err,setErr]=useState(null);
  const hf=e=>{const file=e.target.files[0];if(!file)return;
    Papa.parse(file,{header:true,skipEmptyLines:true,dynamicTyping:false,complete:r=>{
      if(!r.data.length){setErr("No data found");return;}
      const rows=r.data;const cols=Object.keys(rows[0]);const isM=cols.includes("Text")&&cols.includes("Date");
      const map=row=>{if(isM){const pl=PLATFORMS.filter(p=>isPlatTrue(row[p])||isPlatTrue(row["Youtube"]&&p==="YouTube"?row["Youtube"]:null));const b=row.Text||"";return{title:(b.split("\n")[0]||"").slice(0,80)||"Untitled",body:b,platforms:pl,datePublished:row.Date||null,status:"Published",pillar:"Other",format:"Caption",tags:"",notes:"",cluster:"",seqNum:undefined};}
      return{title:(row.title||row.Title||row.text||row.Text||"").slice(0,80)||"Untitled",body:row.body||row.Body||row.text||row.Text||row.Content||"",status:"Idea",pillar:"Other",format:"Caption",platforms:[],tags:"",notes:"",cluster:"",seqNum:undefined};};
      const all=rows.map(map);setMapped(all);setPreview({isM,sample:all.slice(0,3),total:all.length});setErr(null);
    },error:()=>setErr("Could not parse file")});
  };
  return(<Modal title="Import Content Library" onClose={onClose} wide>
    <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"13px 16px",fontSize:"0.82rem",color:"#6e6e6e",marginBottom:"16px",lineHeight:"1.7"}}><strong style={{color:"#2d2d2d"}}>Supported:</strong> Metricool CSV export or any CSV with Text/title, Date, and platform columns.</div>
    <input type="file" accept=".csv" onChange={hf} style={{marginBottom:"14px"}}/>
    {err&&<div style={{color:"#c47050",marginBottom:"10px",fontSize:"0.83rem",padding:"9px",background:"#fdf5f0",borderRadius:"8px"}}>{err}</div>}
    {preview&&<><div style={{marginBottom:"8px",display:"flex",gap:"8px",alignItems:"center"}}><span style={bdg("#5a8f5a")}>{preview.isM?"✓ Metricool format":"CSV format"}</span><span style={{fontSize:"0.8rem",color:"#6e6e6e"}}>{preview.total} items ready</span></div>
      <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"12px",marginBottom:"16px",display:"flex",flexDirection:"column",gap:"7px",maxHeight:"170px",overflowY:"auto"}}>{preview.sample.map((item,i)=><div key={i} style={{padding:"9px 11px",background:"white",borderRadius:"8px",fontSize:"0.79rem"}}><strong>{item.title||"Untitled"}</strong><div style={{color:"#9e9e9e",marginTop:"2px"}}>{trunc(item.body,60)}</div></div>)}</div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:"9px"}}><button style={sBtn()} onClick={onClose}>Cancel</button><button style={pBtn()} onClick={()=>onImport(mapped)}>Import {preview.total} Items</button></div></>}
    {!preview&&<div style={{display:"flex",justifyContent:"flex-end"}}><button style={sBtn()} onClick={onClose}>Cancel</button></div>}
  </Modal>);
}

// ── Import Performance Modal ───────────────────────────────────────────────
function ImportPerfModal({platform,setPlatform,onClose,onImport}){
  const [preview,setPreview]=useState(null);const [mapped,setMapped]=useState([]);const [err,setErr]=useState(null);
  const hf=e=>{const file=e.target.files[0];if(!file)return;setPreview(null);setMapped([]);setErr(null);
    Papa.parse(file,{header:true,skipEmptyLines:true,dynamicTyping:true,complete:r=>{
      if(!r.data.length){setErr("No data found");return;}
      const m=PERF_MAP[platform];
      const items=r.data.map(row=>({platform,title:String(getCol(row,m.title)||"Untitled").slice(0,120),date:getCol(row,m.date)||"",views:+(getCol(row,m.views)||0),reach:+(getCol(row,m.reach||["Reach"])||0),likes:+(getCol(row,m.likes)||0),comments:+(getCol(row,m.comments||["Comments"])||0),engagement:+(getCol(row,m.engagement||["Engagement"])||0),avgWatch:+(getCol(row,m.avgWatch)||0),saved:+(getCol(row,m.saved||["Saved"])||0),shares:+(getCol(row,m.shares||["Shares"])||0),url:String(getCol(row,m.url||["url"])||"")}));
      setMapped(items);setPreview({sample:items.slice(0,3),total:items.length});setErr(null);
    },error:()=>setErr("Could not parse file")});
  };
  return(<Modal title={`Import ${platform} Performance`} onClose={onClose} wide>
    <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}}>{PLATFORMS.filter(p=>p!=="Substack"&&p!=="Threads").map(p=><button key={p} onClick={()=>{setPlatform(p);setPreview(null);setMapped([]);setErr(null);}} style={{padding:"6px 13px",borderRadius:"20px",border:`2px solid ${platform===p?PLAT_C[p]:"#e4e0d8"}`,background:platform===p?`${PLAT_C[p]}15`:"white",color:platform===p?PLAT_C[p]:"#9e9e9e",cursor:"pointer",fontSize:"0.79rem",fontWeight:"600"}}>{p}</button>)}</div>
    <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"11px 14px",fontSize:"0.8rem",color:"#6e6e6e",marginBottom:"14px"}}>Export from {platform} Analytics as CSV and upload here. Columns are auto-mapped.{platform==="TikTok"&&" TikTok: Creator Studio → Analytics → Content → Export."}{platform==="YouTube"&&" YouTube Studio → Analytics → Content → Export CSV."}</div>
    <input type="file" accept=".csv" onChange={hf} style={{marginBottom:"13px"}}/>
    {err&&<div style={{color:"#c47050",fontSize:"0.82rem",marginBottom:"10px",padding:"9px",background:"#fdf5f0",borderRadius:"8px"}}>{err}</div>}
    {preview&&<><div style={{marginBottom:"8px",fontSize:"0.82rem",color:"#6e6e6e"}}>{preview.total} records found</div>
      <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"12px",marginBottom:"16px",display:"flex",flexDirection:"column",gap:"6px"}}>{preview.sample.map((r,i)=><div key={i} style={{padding:"9px 11px",background:"white",borderRadius:"8px",fontSize:"0.78rem"}}><strong>{trunc(r.title,52)}</strong><div style={{color:"#9e9e9e",marginTop:"2px"}}>Views: {r.views?.toLocaleString()} · Likes: {r.likes} · {fmtDate(r.date)}</div></div>)}</div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:"9px"}}><button style={sBtn()} onClick={onClose}>Cancel</button><button style={pBtn()} onClick={()=>onImport(mapped)}>Import {preview.total} Records</button></div></>}
    {!preview&&<div style={{display:"flex",justifyContent:"flex-end"}}><button style={sBtn()} onClick={onClose}>Cancel</button></div>}
  </Modal>);
}

// ── View Modal ─────────────────────────────────────────────────────────────
function ViewModal({item,onClose,onEdit,onDelete,onStatusChange,cc}){
  const sc=STATUS_C[item.status]||"#9e9e9e";
  return(
    <Modal title="Content Detail" onClose={onClose} wide>
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}}>
        <span style={bdg(sc)}>{item.status}</span>
        {item.cluster&&<span style={bdg(cc||"#7a9e7e")}>{item.cluster}{item.seqNum?` #${item.seqNum}`:""}</span>}
        {item.pillar&&<span style={bdg("#7aa8a0")}>{item.pillar}</span>}
        {item.format&&<span style={bdg("#9e9e9e")}>{item.format}</span>}
        {(item.platforms||[]).map(p=><span key={p} style={bdg(PLAT_C[p]||"#9e9e9e")}>{p}</span>)}
      </div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.12rem",fontWeight:"600",marginBottom:"13px",color:"#2d2d2d",lineHeight:"1.35"}}>{item.title||"Untitled"}</div>
      {item.body&&<div style={{background:"#f8f7f4",borderRadius:"10px",padding:"15px 16px",fontSize:"0.86rem",lineHeight:"1.85",color:"#2d2d2d",maxHeight:"280px",overflowY:"auto",whiteSpace:"pre-wrap",marginBottom:"14px",fontFamily:"'Playfair Display',serif"}}>{item.body}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"14px",fontSize:"0.79rem",color:"#9e9e9e"}}>
        {item.dateCreated&&<div>Created: <strong style={{color:"#2d2d2d"}}>{fmtDate(item.dateCreated)}</strong></div>}
        {item.datePublished&&<div>Published: <strong style={{color:"#2d2d2d"}}>{fmtDate(item.datePublished)}</strong></div>}
        {item.tags&&<div style={{gridColumn:"1/-1"}}>Tags: <strong style={{color:"#2d2d2d"}}>{item.tags}</strong></div>}
        {item.notes&&<div style={{gridColumn:"1/-1"}}>Notes: <em style={{color:"#2d2d2d"}}>{item.notes}</em></div>}
      </div>
      <div style={{marginBottom:"18px"}}>
        <div style={{fontSize:"0.73rem",fontWeight:"700",color:"#8a8a7a",marginBottom:"7px",letterSpacing:"0.06em"}}>MOVE TO</div>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>{STATUSES.filter(s=>s!==item.status).map(s=><button key={s} onClick={()=>onStatusChange(item.id,s)} style={{padding:"5px 13px",borderRadius:"20px",border:`1.5px solid ${STATUS_C[s]}`,background:"white",color:STATUS_C[s],cursor:"pointer",fontSize:"0.77rem",fontWeight:"600"}}>{s}</button>)}</div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button style={{...sBtn(),color:"#c47050",fontSize:"0.79rem"}} onClick={()=>onDelete(item.id)}>Delete</button>
        <div style={{display:"flex",gap:"8px"}}><button style={sBtn()} onClick={onClose}>Close</button><button style={pBtn()} onClick={onEdit}>Edit</button></div>
      </div>
    </Modal>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("library");
  const [library,setLibrary]=useState([]);
  const [performance,setPerformance]=useState([]);
  const [ready,setReady]=useState(false);
  const [modal,setModal]=useState(null);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);
  const [impPlat,setImpPlat]=useState("Instagram");
  const [search,setSearch]=useState("");
  const [fPillar,setFPillar]=useState("All");
  const [fStatus,setFStatus]=useState("All");
  const [fPlatform,setFPlatform]=useState("All");
  const [fCluster,setFCluster]=useState("All");
  const [grouped,setGrouped]=useState(true);

  useEffect(()=>{
    try{
      const lib=localStorage.getItem("em_lib_v2");
      if(lib){setLibrary(JSON.parse(lib));}
      else{const seeded=SEED.map(item=>({...item,id:genId(),dateCreated:new Date().toISOString()}));setLibrary(seeded);saveLib(seeded);}
    }catch(e){const seeded=SEED.map(item=>({...item,id:genId(),dateCreated:new Date().toISOString()}));setLibrary(seeded);saveLib(seeded);}
    try{const perf=localStorage.getItem("em_perf");if(perf)setPerformance(JSON.parse(perf));}catch(e){}
    setReady(true);
  },[]);

  const clusters=[...new Set(library.map(i=>i.cluster).filter(Boolean))];
  const getCC=c=>CLUSTER_COLORS[clusters.indexOf(c)%CLUSTER_COLORS.length]||"#9e9e9e";
  const showToast=(msg,err)=>{setToast({msg,err});setTimeout(()=>setToast(null),3000);};

  const updateLib=data=>{setLibrary(data);saveLib(data);};
  const updatePerf=data=>{setPerformance(data);savePerf(data);};

  const filteredLib=library.filter(i=>{
    if(search&&!i.title?.toLowerCase().includes(search.toLowerCase())&&!i.body?.toLowerCase().includes(search.toLowerCase())&&!i.tags?.toLowerCase().includes(search.toLowerCase()))return false;
    if(fCluster!=="All"&&i.cluster!==fCluster)return false;
    if(fPillar!=="All"&&i.pillar!==fPillar)return false;
    if(fStatus!=="All"&&i.status!==fStatus)return false;
    if(fPlatform!=="All"&&!i.platforms?.includes(fPlatform))return false;
    return true;
  });

  const handleSave=item=>{
    let updated;
    if(item.id&&library.find(i=>i.id===item.id)){updated=library.map(i=>i.id===item.id?item:i);showToast("Updated ✓");}
    else{updated=[...library,{...item,id:genId(),dateCreated:new Date().toISOString()}];showToast("Added ✓");}
    updateLib(updated);setModal(null);
  };

  const handleDelete=id=>{if(!confirm("Delete this item?"))return;updateLib(library.filter(i=>i.id!==id));setModal(null);showToast("Deleted");};

  const exportBackup=()=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify({library,performance,brand:"Everyday Modern",exported:new Date().toISOString()},null,2)],{type:"application/json"}));
    a.download=`everyday-modern-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();showToast("Backup downloaded ✓");
  };

  const importBackup=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.library)updateLib(data.library);if(data.performance)updatePerf(data.performance);showToast("Restored ✓");}catch{showToast("Could not read backup",true);}};
    reader.readAsText(file);e.target.value="";};

  if(!ready)return null;

  const ts=t=>({padding:"7px 16px",borderRadius:"20px",border:"none",cursor:"pointer",background:tab===t?"#7a9e7e":"transparent",color:tab===t?"white":"#7a7a7a",fontSize:"0.79rem",fontWeight:tab===t?"700":"400",transition:"all 0.15s"});

  return(
    <div style={{fontFamily:"'Lato',sans-serif",background:"#f8f7f4",minHeight:"100vh"}}>
      <div style={{background:"#2d2d2d",padding:"13px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 16px rgba(0,0,0,0.2)"}}>
        <div>
          <div style={{color:"#7a9e7e",fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",fontWeight:"700",letterSpacing:"-0.01em"}}>Everyday Modern</div>
          <div style={{color:"#5a5a5a",fontSize:"0.61rem",letterSpacing:"0.2em",marginTop:"1px"}}>CONTENT COMMAND CENTRE</div>
        </div>
        <div style={{display:"flex",gap:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"24px",padding:"4px"}}>
          <button style={ts("library")} onClick={()=>setTab("library")}>📚 Library</button>
          <button style={ts("performance")} onClick={()=>setTab("performance")}>📊 Performance</button>
          <button style={ts("planner")} onClick={()=>setTab("planner")}>🗓 Planner</button>
        </div>
        <div style={{display:"flex",gap:"6px"}}>
          <button onClick={exportBackup} style={{padding:"6px 13px",borderRadius:"20px",border:"1px solid #4a4a4a",cursor:"pointer",background:"transparent",color:"#9a9a9a",fontSize:"0.72rem",fontFamily:"inherit"}}>⬇ Backup</button>
          <label style={{padding:"6px 13px",borderRadius:"20px",border:"1px solid #4a4a4a",cursor:"pointer",background:"transparent",color:"#9a9a9a",fontSize:"0.72rem",display:"inline-block",fontFamily:"inherit"}}>⬆ Restore<input type="file" accept=".json" onChange={importBackup} style={{display:"none"}}/></label>
        </div>
      </div>

      <div style={{maxWidth:"1200px",margin:"0 auto",padding:"22px 24px"}}>
        {tab==="library"&&<LibraryTab library={library} filtered={filteredLib} search={search} setSearch={setSearch} fPillar={fPillar} setFPillar={setFPillar} fStatus={fStatus} setFStatus={setFStatus} fPlatform={fPlatform} setFPlatform={setFPlatform} fCluster={fCluster} setFCluster={setFCluster} grouped={grouped} setGrouped={setGrouped} onAdd={()=>{setSelected(null);setModal("add");}} onImport={()=>setModal("import-lib")} onView={item=>{setSelected(item);setModal("view");}} getCC={getCC}/>}
        {tab==="performance"&&<PerformanceTab performance={performance} onImport={p=>{setImpPlat(p);setModal("import-perf");}} onClear={()=>{if(confirm("Clear all performance data?"))updatePerf([]);}}/>}
        {tab==="planner"&&<PlannerTab library={library} performance={performance} getCC={getCC}/>}
      </div>

      {modal==="add"&&<AddModal item={selected} onClose={()=>setModal(null)} onSave={handleSave} clusters={clusters}/>}
      {modal==="edit"&&<AddModal item={selected} onClose={()=>setModal(null)} onSave={handleSave} clusters={clusters}/>}
      {modal==="import-lib"&&<ImportLibModal onClose={()=>setModal(null)} onImport={items=>{updateLib([...library,...items.map(i=>({...i,id:genId(),dateCreated:new Date().toISOString()}))]);setModal(null);showToast(`${items.length} items imported ✓`);}}/>}
      {modal==="import-perf"&&<ImportPerfModal platform={impPlat} setPlatform={setImpPlat} onClose={()=>setModal(null)} onImport={items=>{updatePerf([...performance,...items.map(i=>({...i,id:genId()}))]);setModal(null);showToast(`${items.length} records imported ✓`);}}/>}
      {modal==="view"&&<ViewModal item={selected} onClose={()=>setModal(null)} onEdit={()=>setModal("edit")} onDelete={handleDelete} cc={getCC(selected?.cluster)} onStatusChange={(id,status)=>{const u=library.map(i=>i.id===id?{...i,status}:i);updateLib(u);setSelected({...selected,status});showToast("Status updated ✓");}}/>}

      {toast&&<div style={{position:"fixed",bottom:"24px",right:"24px",background:toast.err?"#c47050":"#5a8f5a",color:"white",padding:"11px 20px",borderRadius:"10px",fontSize:"0.85rem",boxShadow:"0 6px 20px rgba(0,0,0,0.18)",zIndex:9999,fontWeight:"600"}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
