<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday Modern — Content Library</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#f8f7f4;color:#2d2d2d;min-height:100vh}
input,select,textarea,button{font-family:'Lato',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#f0ede8}::-webkit-scrollbar-thumb{background:#c8c4bc;border-radius:3px}
.card-hover{transition:box-shadow 0.15s,transform 0.15s;cursor:pointer}
.card-hover:hover{box-shadow:0 8px 24px rgba(0,0,0,0.12)!important;transform:translateY(-2px)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const STATUS_C={"Available":"#c49a3c","In GHL":"#4a8fa0","Posted":"#7a9e7e"};
const PLAT_C={Facebook:"#1877f2",Instagram:"#e1306c",YouTube:"#ff0000",TikTok:"#010101",Substack:"#ff6719",Threads:"#5c5c5c"};
const FORMATS=["Reel/Short","Graphic","Newsletter","Substack Note","Video Script","Blog","Thread","Quote Card","Other"];
const PLATFORMS=["Facebook","Instagram","YouTube","TikTok","Substack","Threads"];
const PILLARS=["Nervous System","HSP Life","Emotional Triggers","Digital Overwhelm","Tech & Boomers","Seasonal/Social","Other"];

const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const trunc=(s="",n)=>s.length>n?s.slice(0,n)+"…":s;
const save=d=>{try{localStorage.setItem("em_library_v1",JSON.stringify(d));}catch(e){}};
const load=()=>{try{const d=localStorage.getItem("em_library_v1");return d?JSON.parse(d):null;}catch{return null;}};

const parsePlats=s=>{if(!s)return[];const r=[];if(/instagram/i.test(s))r.push("Instagram");if(/facebook/i.test(s))r.push("Facebook");if(/youtube/i.test(s))r.push("YouTube");if(/tiktok/i.test(s))r.push("TikTok");if(/substack/i.test(s))r.push("Substack");if(/threads/i.test(s))r.push("Threads");return r;};
const parseSt=s=>{if(!s||!s.trim())return"Available";const l=s.toLowerCase().trim();if(l.startsWith("posted"))return"Posted";if(l.startsWith("scheduled"))return"In GHL";return"Available";};

// Styles
const inp={padding:"9px 13px",borderRadius:"8px",border:"1.5px solid #e4e0d8",fontSize:"0.85rem",width:"100%",background:"white",boxSizing:"border-box",fontFamily:"inherit",color:"#2d2d2d",outline:"none"};
const pBtn=(c="#7a9e7e")=>({padding:"9px 18px",borderRadius:"8px",border:"none",cursor:"pointer",fontSize:"0.83rem",fontWeight:"700",background:c,color:"white",fontFamily:"inherit",whiteSpace:"nowrap"});
const sBtn=()=>({padding:"8px 15px",borderRadius:"8px",border:"1.5px solid #e4e0d8",cursor:"pointer",fontSize:"0.82rem",fontWeight:"500",background:"white",color:"#4a4a4a",fontFamily:"inherit",whiteSpace:"nowrap"});
const bdg=c=>({display:"inline-flex",alignItems:"center",padding:"3px 8px",borderRadius:"20px",fontSize:"0.66rem",fontWeight:"700",background:`${c}18`,color:c,border:`1px solid ${c}35`,whiteSpace:"nowrap"});
const Lbl=({c})=><div style={{fontSize:"0.72rem",fontWeight:"700",color:"#8a8a7a",marginBottom:"5px",letterSpacing:"0.06em",textTransform:"uppercase"}}>{c}</div>;

// ── Modal shell ──────────────────────────────────────────────────────────────
function Modal({title,onClose,children,wide}){
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(20,15,10,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"20px",backdropFilter:"blur(4px)"}}>
      <div style={{background:"white",borderRadius:"18px",padding:"28px 30px",width:"100%",maxWidth:wide?"740px":"480px",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 28px 70px rgba(0,0,0,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",fontWeight:"700",color:"#2d2d2d"}}>{title}</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.5rem",color:"#bbb",lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Content card ─────────────────────────────────────────────────────────────
function Card({item,onClick,onStatusChange}){
  const sc=STATUS_C[item.status]||STATUS_C.Available;
  const next=item.status==="Available"?"In GHL":item.status==="In GHL"?"Posted":"Available";
  return(
    <div style={{background:"white",borderRadius:"14px",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderTop:`3px solid ${sc}`,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {/* Hook — clickable */}
      <div className="card-hover" onClick={onClick} style={{padding:"16px 18px 12px",flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px",gap:"8px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:"700",fontSize:"0.95rem",color:"#2d2d2d",lineHeight:"1.35",flex:1}}>{item.hook||item.title||"Untitled"}</div>
          <span style={bdg(sc)}>{item.status}</span>
        </div>
        {item.caption&&<div style={{fontSize:"0.78rem",color:"#6e6e6e",lineHeight:"1.6",marginBottom:"10px"}}>{trunc(item.caption,130)}</div>}
        <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:item.visualDir||item.triggerWord?"8px":"0"}}>
          {(item.platforms||[]).map(p=><span key={p} style={{...bdg(PLAT_C[p]||"#9e9e9e"),fontSize:"0.6rem"}}>{p}</span>)}
          {item.format&&<span style={{...bdg("#9e9e9e"),fontSize:"0.6rem"}}>{item.format}</span>}
        </div>
        {item.visualDir&&<div style={{fontSize:"0.72rem",color:"#a0a098",marginTop:"4px"}}>📷 {trunc(item.visualDir,60)}</div>}
        {item.triggerWord&&<div style={{fontSize:"0.72rem",color:"#7aa8a0",marginTop:"3px"}}>💬 Comment: <strong>{item.triggerWord}</strong></div>}
        {item.productCTA&&<div style={{fontSize:"0.72rem",color:"#b07040",marginTop:"3px"}}>🛒 {item.productCTA}</div>}
        {item.canvaLink&&<div style={{fontSize:"0.72rem",marginTop:"3px"}}><a href={item.canvaLink} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{color:"#652cd1",textDecoration:"none"}}>🎨 Open in Canva ↗</a></div>}
      </div>
      {/* Status toggle */}
      <div style={{borderTop:"1px solid #f0ede8",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:"0.71rem",color:"#b8b8b0"}}>{item.date?`📅 ${item.date}`:""}&nbsp;</span>
        <button onClick={e=>{e.stopPropagation();onStatusChange(item.id,next);}} style={{padding:"4px 12px",borderRadius:"20px",border:`1.5px solid ${STATUS_C[next]}`,background:"white",color:STATUS_C[next],cursor:"pointer",fontSize:"0.7rem",fontWeight:"700"}}>→ {next}</button>
      </div>
    </div>
  );
}

// ── Detail modal ─────────────────────────────────────────────────────────────
function DetailModal({item,onClose,onEdit,onDelete,onStatusChange}){
  const sc=STATUS_C[item.status]||STATUS_C.Available;
  const [copied,setCopied]=useState(null);
  const copy=(text,field)=>{navigator.clipboard.writeText(text).then(()=>{setCopied(field);setTimeout(()=>setCopied(null),1500);});};
  const CopyBtn=({text,field})=><button onClick={()=>copy(text,field)} style={{padding:"3px 9px",borderRadius:"6px",border:"1px solid #e4e0d8",background:"white",cursor:"pointer",fontSize:"0.68rem",color:copied===field?"#7a9e7e":"#9e9e9e",marginLeft:"8px"}}>{copied===field?"✓ Copied":"Copy"}</button>;

  return(
    <Modal title="Content Detail" onClose={onClose} wide>
      <div style={{display:"flex",gap:"7px",flexWrap:"wrap",marginBottom:"16px"}}>
        <span style={bdg(sc)}>{item.status}</span>
        {item.format&&<span style={bdg("#9e9e9e")}>{item.format}</span>}
        {(item.platforms||[]).map(p=><span key={p} style={bdg(PLAT_C[p]||"#9e9e9e")}>{p}</span>)}
        {item.pillar&&<span style={bdg("#7aa8a0")}>{item.pillar}</span>}
      </div>

      {/* Hook */}
      <div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"5px"}}><Lbl c="Hook / Topic"/><CopyBtn text={item.hook} field="hook"/></div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",fontWeight:"700",color:"#2d2d2d",lineHeight:"1.4"}}>{item.hook||"—"}</div>
      </div>

      {/* Caption */}
      {item.caption&&<div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"5px"}}><Lbl c="Caption"/><CopyBtn text={item.caption} field="caption"/></div>
        <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"14px 16px",fontSize:"0.85rem",lineHeight:"1.85",color:"#2d2d2d",whiteSpace:"pre-wrap",maxHeight:"220px",overflowY:"auto"}}>{item.caption}</div>
      </div>}

      {/* Hashtags */}
      {item.hashtags&&<div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"5px"}}><Lbl c="Hashtags"/><CopyBtn text={item.hashtags} field="hashtags"/></div>
        <div style={{fontSize:"0.8rem",color:"#652cd1",lineHeight:"1.7"}}>{item.hashtags}</div>
      </div>}

      {/* Grid of details */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
        {item.visualDir&&<div><Lbl c="Visual Direction"/><div style={{fontSize:"0.82rem",color:"#2d2d2d"}}>{item.visualDir}</div></div>}
        {item.triggerWord&&<div><Lbl c="Comment Trigger"/><div style={{fontSize:"0.9rem",fontWeight:"700",color:"#7aa8a0"}}>"{item.triggerWord}"</div></div>}
        {item.productCTA&&<div><Lbl c="Product CTA"/><div style={{fontSize:"0.82rem",color:"#b07040"}}>{item.productCTA}</div></div>}
        {item.date&&<div><Lbl c="Date"/><div style={{fontSize:"0.82rem"}}>{item.date}</div></div>}
        {item.specialEvent&&<div><Lbl c="Special Event"/><div style={{fontSize:"0.82rem"}}>{item.specialEvent}</div></div>}
      </div>

      {item.canvaLink&&<div style={{marginBottom:"16px",padding:"12px 14px",background:"#f5f3fe",borderRadius:"10px",border:"1px solid #a38cf340"}}>
        <Lbl c="Canva Design"/>
        <a href={item.canvaLink} target="_blank" rel="noopener" style={{color:"#652cd1",fontWeight:"600",fontSize:"0.85rem",textDecoration:"none"}}>🎨 Open design in Canva ↗</a>
      </div>}

      {item.notes&&<div style={{marginBottom:"16px"}}>
        <Lbl c="Notes"/><div style={{fontSize:"0.82rem",color:"#6e6e6e"}}>{item.notes}</div>
      </div>}

      {/* Move to */}
      <div style={{marginBottom:"20px"}}>
        <Lbl c="Move status to"/>
        <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
          {Object.keys(STATUS_C).filter(s=>s!==item.status).map(s=>(
            <button key={s} onClick={()=>{onStatusChange(item.id,s);onClose();}} style={{padding:"5px 14px",borderRadius:"20px",border:`1.5px solid ${STATUS_C[s]}`,background:"white",color:STATUS_C[s],cursor:"pointer",fontSize:"0.78rem",fontWeight:"700"}}>{s}</button>
          ))}
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button style={{...sBtn(),color:"#c47050",fontSize:"0.78rem"}} onClick={()=>onDelete(item.id)}>Delete</button>
        <div style={{display:"flex",gap:"8px"}}><button style={sBtn()} onClick={onClose}>Close</button><button style={pBtn()} onClick={onEdit}>Edit</button></div>
      </div>
    </Modal>
  );
}

// ── Add / Edit modal ─────────────────────────────────────────────────────────
function EditModal({item,onClose,onSave}){
  const blank={hook:"",caption:"",hashtags:"",platforms:[],format:"Reel/Short",pillar:"Nervous System",visualDir:"",triggerWord:"",productCTA:"",canvaLink:"",notes:"",date:"",status:"Available"};
  const [f,setF]=useState(item?{...blank,...item}:blank);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const tp=p=>s("platforms",f.platforms.includes(p)?f.platforms.filter(x=>x!==p):[...f.platforms,p]);
  return(
    <Modal title={item?"Edit Content":"Add Content"} onClose={onClose} wide>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"13px"}}>
        <div style={{gridColumn:"1/-1"}}>
          <Lbl c="Hook / First Line (what grabs attention)"/>
          <input style={inp} value={f.hook} onChange={e=>s("hook",e.target.value)} placeholder="e.g. You've been told to breathe. To journal. And you're still exhausted."/>
        </div>
        <div style={{gridColumn:"1/-1"}}>
          <Lbl c="Full Caption / Body Text"/>
          <textarea style={{...inp,minHeight:"120px",resize:"vertical"}} value={f.caption} onChange={e=>s("caption",e.target.value)} placeholder="Paste your full caption, newsletter text, script, or blog post here…"/>
        </div>
        <div style={{gridColumn:"1/-1"}}>
          <Lbl c="Hashtags"/>
          <input style={inp} value={f.hashtags} onChange={e=>s("hashtags",e.target.value)} placeholder="#mentalhealth #HSP #nervoussystemregulation…"/>
        </div>
        <div>
          <Lbl c="Format"/>
          <select style={{...inp,cursor:"pointer"}} value={f.format} onChange={e=>s("format",e.target.value)}>{FORMATS.map(x=><option key={x}>{x}</option>)}</select>
        </div>
        <div>
          <Lbl c="Status"/>
          <select style={{...inp,cursor:"pointer"}} value={f.status} onChange={e=>s("status",e.target.value)}>{Object.keys(STATUS_C).map(x=><option key={x}>{x}</option>)}</select>
        </div>
        <div style={{gridColumn:"1/-1"}}>
          <Lbl c="Platforms"/>
          <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
            {PLATFORMS.map(p=><button key={p} type="button" onClick={()=>tp(p)} style={{padding:"5px 12px",borderRadius:"20px",border:`2px solid ${f.platforms.includes(p)?PLAT_C[p]:"#e4e0d8"}`,background:f.platforms.includes(p)?`${PLAT_C[p]}18`:"white",color:f.platforms.includes(p)?PLAT_C[p]:"#9e9e9e",cursor:"pointer",fontSize:"0.78rem",fontWeight:"600"}}>{p}</button>)}
          </div>
        </div>
        <div>
          <Lbl c="Visual Direction / Creative Type"/>
          <input style={inp} value={f.visualDir} onChange={e=>s("visualDir",e.target.value)} placeholder="e.g. Talking head, 1080×1920, dark background"/>
        </div>
        <div>
          <Lbl c="Comment Trigger Word"/>
          <input style={inp} value={f.triggerWord} onChange={e=>s("triggerWord",e.target.value)} placeholder="e.g. ANCHOR"/>
        </div>
        <div>
          <Lbl c="Product CTA"/>
          <input style={inp} value={f.productCTA} onChange={e=>s("productCTA",e.target.value)} placeholder="e.g. The 90-Second Anchor (free)"/>
        </div>
        <div>
          <Lbl c="Date / Week"/>
          <input style={inp} value={f.date} onChange={e=>s("date",e.target.value)} placeholder="e.g. 15 May 2026"/>
        </div>
        <div style={{gridColumn:"1/-1"}}>
          <Lbl c="Canva Design Link (optional)"/>
          <input style={inp} value={f.canvaLink} onChange={e=>s("canvaLink",e.target.value)} placeholder="https://www.canva.com/design/…"/>
        </div>
        <div style={{gridColumn:"1/-1"}}>
          <Lbl c="Notes"/>
          <input style={inp} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Any notes for yourself…"/>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:"9px",marginTop:"20px"}}>
        <button style={sBtn()} onClick={onClose}>Cancel</button>
        <button style={pBtn()} onClick={()=>{if(!f.hook&&!f.caption)return alert("Add a hook or caption first");onSave({...f,id:f.id||genId(),dateCreated:f.dateCreated||new Date().toISOString()});}}>Save</button>
      </div>
    </Modal>
  );
}

// ── Import modal ─────────────────────────────────────────────────────────────
function ImportModal({onClose,onImport}){
  const [preview,setPreview]=useState(null);const [rows,setRows]=useState([]);const [err,setErr]=useState(null);

  const handle=e=>{
    const file=e.target.files[0];if(!file)return;
    // Parse as raw arrays first so we can find the real header row
    Papa.parse(file,{header:false,skipEmptyLines:true,dynamicTyping:false,
      complete:raw=>{
        if(!raw.data.length){setErr("No data found");return;}
        // Find the row containing actual column headers
        const hIdx=raw.data.findIndex(row=>row.some(c=>String(c).toUpperCase().includes("HOOK")||String(c).toUpperCase().includes("CAPTION")||String(c).toUpperCase()==="STATUS"&&row.some(d=>String(d).toUpperCase().includes("HOOK"))));
        // Build rows object using the found header row
        let rows;
        if(hIdx>=0){
          const headers=raw.data[hIdx].map(h=>String(h).trim());
          rows=raw.data.slice(hIdx+1).map(row=>{const o={};headers.forEach((h,i)=>{o[h]=row[i]!=null?String(row[i]):"";});return o;}).filter(r=>Object.values(r).some(v=>v.trim()));
        } else {
          // Fallback: use first row as headers
          const headers=raw.data[0].map(h=>String(h).trim());
          rows=raw.data.slice(1).map(row=>{const o={};headers.forEach((h,i)=>{o[h]=row[i]!=null?String(row[i]):"";});return o;}).filter(r=>Object.values(r).some(v=>v.trim()));
        }
        if(!rows.length){setErr("No data rows found");return;}
        const cols=Object.keys(rows[0]);
        const isGHL=cols.some(c=>c.includes("HOOK")||c.includes("GHL PRIMARY"));
        const isDailyCal=cols.some(c=>c.includes("Main Line"))&&cols.some(c=>c.includes("Caption"));

        let mapped;
        if(isGHL){
          mapped=rows.filter(row=>(row["HOOK / TOPIC"]||row["CAPTION"]||"").trim()).map(row=>({
            id:genId(),hook:row["HOOK / TOPIC"]||"",caption:row["CAPTION"]||"",hashtags:row["HASHTAGS"]||"",
            platforms:parsePlats(row["GHL PRIMARY PLATFORM(S)"]||""),format:(row["POST TYPE"]||"Reel/Short").replace("Video — ","").replace("Graphic — ","Graphic ").trim(),
            visualDir:`${row["CREATIVE TYPE"]||""} ${row["CREATIVE SIZE"]||""}`.trim(),
            triggerWord:row["COMMENT TRIGGER WORD"]||"",productCTA:row["PRODUCT CTA"]||"",
            status:parseSt(row["STATUS"]||""),date:row["DATE"]||"",
            notes:row["GHL SCHEDULING NOTES"]||"",pillar:row["CONTENT PILLAR"]||"",
            specialEvent:row["SPECIAL EVENT"]||"",canvaLink:"",dateCreated:new Date().toISOString()
          }));
        } else if(isDailyCal){
          mapped=rows.filter(row=>(row["Main Line / Hook"]||"").trim()).map(row=>({
            id:genId(),hook:row["Main Line / Hook"]||"",caption:row["Caption"]||"",
            hashtags:row["Suggested Tags"]||"",platforms:[],format:row["Format"]||"Graphic",
            visualDir:row["Visual Direction"]||"",triggerWord:"",productCTA:"",
            status:"Available",date:row["Date"]||"",notes:row["Comment Prompt"]||"",
            pillar:"",specialEvent:"",canvaLink:"",dateCreated:new Date().toISOString()
          }));
        } else {
          // Generic - best guess
          mapped=rows.map(row=>{
            const vals=Object.values(row);
            const hook=row["hook"]||row["Hook"]||row["HOOK"]||row["title"]||row["Title"]||vals[0]||"";
            const caption=row["caption"]||row["Caption"]||row["CAPTION"]||row["body"]||row["Body"]||vals[1]||"";
            return{id:genId(),hook:String(hook).slice(0,200),caption:String(caption),hashtags:row["hashtags"]||row["Hashtags"]||row["HASHTAGS"]||"",
              platforms:[],format:"Other",visualDir:"",triggerWord:"",productCTA:"",status:"Available",
              date:"",notes:"",pillar:"",canvaLink:"",dateCreated:new Date().toISOString()};
          }).filter(i=>i.hook||i.caption);
        }
        const type=isGHL?"✓ GHL Calendar format detected":isDailyCal?"✓ Daily Calendar format detected":"Generic CSV";
        setRows(mapped);setPreview({type,total:mapped.length,sample:mapped.slice(0,3)});setErr(null);
      },
      error:()=>setErr("Could not read this file")
    });
  };

  return(
    <Modal title="Import Content" onClose={onClose} wide>
      <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"13px 16px",fontSize:"0.82rem",color:"#6e6e6e",marginBottom:"16px",lineHeight:"1.7"}}>
        <strong style={{color:"#2d2d2d"}}>Works with your GHL Excel calendar</strong> — just export as CSV from Excel (File → Save As → CSV) and upload here. Also works with the daily calendar format or any spreadsheet with hook/caption columns.
      </div>
      <input type="file" accept=".csv,.xlsx" onChange={handle} style={{marginBottom:"14px"}}/>
      {err&&<div style={{color:"#c47050",marginBottom:"10px",fontSize:"0.83rem",padding:"9px",background:"#fdf5f0",borderRadius:"8px"}}>{err}</div>}
      {preview&&<>
        <div style={{marginBottom:"10px",display:"flex",gap:"8px",alignItems:"center"}}>
          <span style={bdg("#5a8f5a")}>{preview.type}</span>
          <span style={{fontSize:"0.8rem",color:"#6e6e6e"}}>{preview.total} items ready to import</span>
        </div>
        <div style={{background:"#f8f7f4",borderRadius:"10px",padding:"12px",marginBottom:"16px",display:"flex",flexDirection:"column",gap:"8px",maxHeight:"200px",overflowY:"auto"}}>
          {preview.sample.map((item,i)=>(
            <div key={i} style={{padding:"10px 12px",background:"white",borderRadius:"8px"}}>
              <div style={{fontSize:"0.82rem",fontWeight:"700",marginBottom:"3px"}}>{item.hook||"Untitled"}</div>
              <div style={{fontSize:"0.74rem",color:"#9e9e9e"}}>{trunc(item.caption,80)} {item.platforms?.length>0&&`· ${item.platforms.join(", ")}`} · <span style={{color:STATUS_C[item.status]||"#aaa"}}>{item.status}</span></div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:"9px"}}>
          <button style={sBtn()} onClick={onClose}>Cancel</button>
          <button style={pBtn()} onClick={()=>onImport(rows)}>Import {preview.total} items</button>
        </div>
      </>}
      {!preview&&<div style={{display:"flex",justifyContent:"flex-end"}}><button style={sBtn()} onClick={onClose}>Cancel</button></div>}
    </Modal>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [library,setLib]=useState([]);
  const [ready,setReady]=useState(false);
  const [modal,setModal]=useState(null); // null | "add" | "edit" | "import" | "detail"
  const [selected,setSel]=useState(null);
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState("");
  const [fPlat,setFPlat]=useState("All");
  const [fFormat,setFFormat]=useState("All");
  const [fStatus,setFStatus]=useState("All");
  const [sort,setSort]=useState("newest");

  useEffect(()=>{
    const d=load();
    if(d&&d.length>0)setLib(d);
    setReady(true);
  },[]);

  const update=d=>{setLib(d);save(d);};
  const showToast=(msg,err)=>{setToast({msg,err});setTimeout(()=>setToast(null),2800);};

  const handleSave=item=>{
    let next;
    if(library.find(i=>i.id===item.id))next=library.map(i=>i.id===item.id?item:i);
    else next=[{...item,dateCreated:item.dateCreated||new Date().toISOString()},...library];
    update(next);setModal(null);showToast(library.find(i=>i.id===item.id)?"Updated ✓":"Added ✓");
  };

  const handleStatus=(id,st)=>{const next=library.map(i=>i.id===id?{...i,status:st}:i);update(next);setSel(s=>s&&s.id===id?{...s,status:st}:s);showToast(`Moved to ${st} ✓`);};
  const handleDelete=id=>{if(!confirm("Delete this item?"))return;update(library.filter(i=>i.id!==id));setModal(null);showToast("Deleted");};

  const exportBackup=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify({library,exported:new Date().toISOString()},null,2)],{type:"application/json"}));a.download=`em-library-${new Date().toISOString().slice(0,10)}.json`;a.click();showToast("Backup saved ✓");};
  const importBackup=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.library)update(d.library);showToast(`Restored ${d.library?.length||0} items ✓`);}catch{showToast("Could not read backup",true);}};r.readAsText(file);e.target.value="";};

  // Filter + sort
  const filtered=library.filter(i=>{
    if(search&&!i.hook?.toLowerCase().includes(search.toLowerCase())&&!i.caption?.toLowerCase().includes(search.toLowerCase())&&!i.hashtags?.toLowerCase().includes(search.toLowerCase()))return false;
    if(fPlat!=="All"&&!i.platforms?.includes(fPlat))return false;
    if(fFormat!=="All"&&i.format!==fFormat)return false;
    if(fStatus!=="All"&&i.status!==fStatus)return false;
    return true;
  });

  const sorted=[...filtered].sort((a,b)=>{
    if(sort==="newest")return new Date(b.dateCreated||0)-new Date(a.dateCreated||0);
    if(sort==="oldest")return new Date(a.dateCreated||0)-new Date(b.dateCreated||0);
    if(sort==="status"){const o={Available:0,"In GHL":1,Posted:2};return (o[a.status]||0)-(o[b.status]||0);}
    return 0;
  });

  const counts=Object.fromEntries(Object.keys(STATUS_C).map(s=>[s,library.filter(i=>i.status===s).length]));

  if(!ready)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f8f7f4",flexDirection:"column",gap:"10px"}}><div style={{color:"#7a9e7e",fontFamily:"'Playfair Display',serif",fontSize:"1.6rem"}}>Everyday Modern</div><div style={{color:"#b8b8b0",fontSize:"0.78rem",letterSpacing:"0.1em"}}>LOADING…</div></div>;

  const sel={...inp,maxWidth:"145px",cursor:"pointer",fontSize:"0.8rem"};

  return(
    <div style={{fontFamily:"'Lato',sans-serif",background:"#f8f7f4",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#2d2d2d",padding:"0 24px",height:"56px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 16px rgba(0,0,0,0.22)"}}>
        <div>
          <span style={{color:"#7a9e7e",fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",fontWeight:"700"}}>Everyday Modern</span>
          <span style={{color:"#5a5a5a",fontSize:"0.6rem",letterSpacing:"0.2em",marginLeft:"10px"}}>CONTENT LIBRARY</span>
        </div>
        <div style={{display:"flex",gap:"7px",alignItems:"center"}}>
          <button onClick={()=>setModal("import")} style={{...sBtn(),background:"#3a3a3a",border:"1px solid #5a5a5a",color:"#d0d0d0",fontSize:"0.78rem"}}>⬆ Import CSV</button>
          <button onClick={()=>{setSel(null);setModal("add");}} style={pBtn()}>+ Add Content</button>
          <button onClick={exportBackup} style={{padding:"6px 11px",borderRadius:"20px",border:"1px solid #4a4a4a",cursor:"pointer",background:"transparent",color:"#8a8a8a",fontSize:"0.7rem",fontFamily:"inherit"}}>⬇ Backup</button>
          <label style={{padding:"6px 11px",borderRadius:"20px",border:"1px solid #4a4a4a",cursor:"pointer",background:"transparent",color:"#8a8a8a",fontSize:"0.7rem",fontFamily:"inherit",display:"inline-block"}}>⬆ Restore<input type="file" accept=".json" onChange={importBackup} style={{display:"none"}}/></label>
        </div>
      </div>

      <div style={{maxWidth:"1280px",margin:"0 auto",padding:"20px 24px"}}>
        {/* Status summary */}
        <div style={{display:"flex",gap:"10px",marginBottom:"18px",flexWrap:"wrap"}}>
          {[{label:"Total",val:library.length,c:"#2d2d2d"},...Object.entries(STATUS_C).map(([s,c])=>({label:s,val:counts[s]||0,c}))].map(({label,val,c})=>(
            <div key={label} onClick={()=>setFStatus(label==="Total"?"All":label)} style={{background:"white",borderRadius:"12px",padding:"12px 18px",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",cursor:"pointer",borderBottom:`3px solid ${label==="Total"?"#e8e4dc":c}`,transition:"all 0.12s",minWidth:"90px"}}>
              <div style={{fontSize:"1.7rem",fontWeight:"800",color:c,lineHeight:1}}>{val}</div>
              <div style={{fontSize:"0.68rem",color:"#9e9e9e",marginTop:"3px",letterSpacing:"0.04em"}}>{label.toUpperCase()}</div>
            </div>
          ))}
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:"6px",fontSize:"0.73rem",color:"#b0b0a8"}}>
            <span>Click a status card to filter</span>
          </div>
        </div>

        {/* Filters */}
        <div style={{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap",alignItems:"center"}}>
          <input style={{...inp,maxWidth:"240px"}} placeholder="🔍  Search hooks, captions, hashtags…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select style={sel} value={fPlat} onChange={e=>setFPlat(e.target.value)}><option value="All">All Platforms</option>{PLATFORMS.map(p=><option key={p}>{p}</option>)}</select>
          <select style={sel} value={fFormat} onChange={e=>setFFormat(e.target.value)}><option value="All">All Formats</option>{FORMATS.map(f=><option key={f}>{f}</option>)}</select>
          <select style={sel} value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="All">All Status</option>{Object.keys(STATUS_C).map(s=><option key={s}>{s}</option>)}</select>
          <select style={sel} value={sort} onChange={e=>setSort(e.target.value)}><option value="newest">Newest first</option><option value="oldest">Oldest first</option><option value="status">By status</option></select>
          {(search||fPlat!=="All"||fFormat!=="All"||fStatus!=="All")&&<button onClick={()=>{setSearch("");setFPlat("All");setFFormat("All");setFStatus("All");}} style={{...sBtn(),fontSize:"0.76rem",color:"#c47050"}}>✕ Clear</button>}
          <div style={{marginLeft:"auto",fontSize:"0.75rem",color:"#b0b0a8"}}>{sorted.length} item{sorted.length!==1?"s":""}</div>
        </div>

        {/* Content Grid */}
        {sorted.length===0?(
          <div style={{background:"white",borderRadius:"18px",padding:"70px 40px",textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
            {library.length===0?(
              <>
                <div style={{fontSize:"3.5rem",marginBottom:"16px"}}>📚</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:"#2d2d2d",marginBottom:"8px"}}>Your content library is empty</div>
                <div style={{color:"#9e9e9e",fontSize:"0.88rem",marginBottom:"24px",lineHeight:"1.7",maxWidth:"400px",margin:"0 auto 24px"}}>
                  Import your GHL Excel calendar as a CSV, or add content manually.<br/>Everything goes here — hooks, captions, newsletters, blogs, scripts.
                </div>
                <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
                  <button style={pBtn("#4a8fa0")} onClick={()=>setModal("import")}>⬆ Import from GHL Calendar</button>
                  <button style={pBtn()} onClick={()=>{setSel(null);setModal("add");}}>+ Add Content Manually</button>
                </div>
              </>
            ):<div style={{color:"#9e9e9e",fontSize:"0.9rem"}}>No items match your filters</div>}
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"14px"}}>
            {sorted.map(item=>(
              <Card key={item.id} item={item}
                onClick={()=>{setSel(item);setModal("detail");}}
                onStatusChange={handleStatus}/>
            ))}
          </div>
        )}
      </div>

      {/* Modals */}
      {modal==="add"&&<EditModal item={null} onClose={()=>setModal(null)} onSave={handleSave}/>}
      {modal==="edit"&&selected&&<EditModal item={selected} onClose={()=>setModal(null)} onSave={handleSave}/>}
      {modal==="import"&&<ImportModal onClose={()=>setModal(null)} onImport={items=>{const next=[...items,...library];update(next);setModal(null);showToast(`${items.length} items imported ✓`);}}/>}
      {modal==="detail"&&selected&&<DetailModal item={selected} onClose={()=>setModal(null)} onEdit={()=>setModal("edit")} onDelete={handleDelete} onStatusChange={handleStatus}/>}

      {toast&&<div style={{position:"fixed",bottom:"22px",right:"22px",background:toast.err?"#c47050":"#5a8f5a",color:"white",padding:"11px 20px",borderRadius:"10px",fontSize:"0.85rem",boxShadow:"0 6px 20px rgba(0,0,0,0.18)",zIndex:9999,fontWeight:"600"}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
